name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-swift-packages:
    name: Verify Swift package (${{ matrix.package }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - WhoopProtocol
          - OuraProtocol
          - WhoopStore
          - StrandAnalytics
          - StrandImport
          - StrandDesign
          - NoopLocalAccess
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test ${{ matrix.package }}
        run: swift test
        working-directory: Packages/${{ matrix.package }}

  apple:
    name: Build Apple artifacts
    needs: verify-swift-packages
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building Apple artifacts for v$version"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run macOS app tests
        run: >-
          xcodebuild -scheme Strand -configuration Debug
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          test

      - name: Build macOS app
        run: |
          set -euo pipefail
          rm -rf build/release-dd
          xcodebuild -scheme Strand -configuration Release \
            -derivedDataPath build/release-dd \
            -destination 'generic/platform=macOS' \
            ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO build
          app="build/release-dd/Build/Products/Release/NOOP.app"
          test -d "$app"
          lipo -info "$app/Contents/MacOS/NOOP"
          lipo -info "$app/Contents/MacOS/NOOP" | grep -E 'x86_64.*arm64|arm64.*x86_64'
          Tools/anonymize-macos-app.sh "$app"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$app" "dist/NOOP-v${VERSION}-macos.zip"

      - name: Build unsigned iOS IPA
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          needle = "\n      - target: NOOPWatch\n"
          if needle not in text:
              raise SystemExit("NOOPWatch dependency not found in project.yml")
          path.write_text(text.replace(needle, "\n", 1))
          PY
          xcodegen generate
          rm -rf build/ios-dd build/ios-stage
          xcodebuild -scheme NOOPiOS -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios-dd \
            CODE_SIGNING_ALLOWED=NO build
          app="build/ios-dd/Build/Products/Release-iphoneos/NOOP.app"
          test -d "$app"
          Tools/anonymize-ios-app.sh "$app"
          stage="build/ios-stage"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          rm -rf "$stage"
          mkdir -p "$stage/Payload"
          ditto "$app" "$stage/Payload/NOOP.app"
          rm -rf "$stage/Payload/NOOP.app/Watch"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$stage/Payload" "$GITHUB_WORKSPACE/dist/NOOP-v${VERSION}-ios.ipa"
          ls -lh "$GITHUB_WORKSPACE/dist/NOOP-v${VERSION}-ios.ipa"

      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noop-apple-artifacts
          path: |
            dist/NOOP-v*-macos.zip
            dist/NOOP-v*-ios.ipa
          if-no-files-found: error

  android:
    name: Build Android artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building Android artifact for v$version"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        run: ./gradlew testFullDebugUnitTest
        working-directory: android

      - name: Build full release APK
        run: ./gradlew assembleFullRelease
        working-directory: android

      - name: Collect Android artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp android/app/build/outputs/apk/full/release/app-full-release.apk "dist/NOOP-v${VERSION}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: noop-android-artifact
          path: dist/NOOP-v*.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - apple
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: noop-*
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum NOOP-v* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -lh dist
          notes="NOOP ${TAG} maintained release. Verify downloads with SHA256SUMS.txt."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "NOOP ${TAG}" --notes "$notes" --latest
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "NOOP ${TAG}" --notes "$notes" --latest
          fi
