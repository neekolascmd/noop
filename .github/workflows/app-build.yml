# Test and compile verification for the macOS, iOS, and watchOS app targets.
#
# Why this exists: the iOS app is a build-from-source community port (no App Store —
# NOOP stays anonymous), so it isn't exercised on a device by the maintainer. This job
# tests macOS and compiles every Apple app target on relevant changes so a shared-code
# change can't silently break iOS, watchOS, or macOS. It is anonymity-safe:
# CODE_SIGNING_ALLOWED=NO, no secrets, no signing identity, and no uploaded artifacts.
name: App CI (macOS + iOS + watchOS)

on:
  pull_request:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandTests/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'NOOPWatch/**'
      - 'NOOPWatchComplications/**'
      - 'Packages/**'
      - 'project.yml'
      - '.github/workflows/app-build.yml'
  push:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandTests/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'NOOPWatch/**'
      - 'NOOPWatchComplications/**'
      - 'Packages/**'
      - 'project.yml'
      - '.github/workflows/app-build.yml'
  workflow_dispatch:

concurrency:
  group: app-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: Strand
            destination: 'platform=macOS'
            action: test
          - scheme: NOOPiOS
            destination: 'generic/platform=iOS Simulator'
            action: build
          - scheme: NOOPWatch
            destination: 'generic/platform=watchOS'
            action: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare sideload iOS build
        if: matrix.scheme == 'NOOPiOS'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          needle = "\n      - target: NOOPWatch\n"
          if needle not in text:
              raise SystemExit("NOOPWatch dependency not found in project.yml")
          path.write_text(text.replace(needle, "\n", 1))
          PY

      - name: Generate Xcode project
        run: xcodegen generate

      - name: ${{ matrix.action }} ${{ matrix.scheme }}
        run: >-
          xcodebuild -scheme '${{ matrix.scheme }}' -configuration Debug
          -destination '${{ matrix.destination }}'
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          '${{ matrix.action }}'
